groups:
  - name: critical-alerts
    rules:
      - alert: HighDltCount
        expr: increase(notification_dlt_total[5m]) > 20
        labels:
          severity: critical
        annotations:
          summary: "DLT is growing"

      - alert: HighConsumerLag
        expr: kafka_consumer_fetch_manager_records_lag_max > 1000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Consumer lag is growing"

      - alert: StopConsumerAndGrowLag
        expr:  kafka_consumer_fetch_manager_records_lag_max > 1500 and increase(notification_processed_total[10m]) == 0
        for : 10m
        labels:
          severity: critical
        annotations:
          summary: "Consumer is down"

  - name: warning-alerts
    rules:
      - alert: HighTimeExecution
        expr: histogram_quantile(0.95, sum(rate(notification_processing_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "95 percentil is growing"

      - alert: HighCpuUsage
        expr: max(process_cpu_usage) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU high usage"

      - alert: HighHeapUsage
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Heap high usage"

      - alert: HighDuplicateCount
        expr: increase(notification_duplicates_total[5m]) > 1
        labels:
          severity: warning
        annotations:
          summary: "High duplicate count"

