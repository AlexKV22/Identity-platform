rule_files:
  - alerts.yml

global:
  scrape_interval: 15s

scrape_configs:
  -   job_name: 'notification-service'
      metrics_path: '/actuator/prometheus'
      static_configs:
        - targets:
            - host.docker.internal:8081

  - job_name: 'account-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - host.docker.internal:8080

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - host.docker.internal:9093