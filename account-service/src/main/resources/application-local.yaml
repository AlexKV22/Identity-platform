spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      acks: all
      retries: 3
      properties:
        schema.registry.url: http://localhost:8085
        request.timeout.ms: 3000   #Время ожидания ответа от брокера, если выше - failed, пробуем еще. Дальше - исключение
        delivery.timeout.ms: 10000 #Время на отправку сообщения вообще, со всеми повторами и прочим, нет - валим исключение.
        enable:
          idempotence: true
    template:
#      default-topic: verification-code-events-local
      default-topic: test-topic

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: auth_user

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8


  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/aleksandrkakovkin
    username: postgres
    password: postgres
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        hbm2ddl:
          auto: create-drop
        default_schema: auth_user

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

jwt:
  secret: mysososecretsecretkeyanddontspeak
  expiration: 900000
  refresh-expiration-ms: 1800000

resilience4j:
  circuitbreaker:
    instances:
      kafkaProducer:
        sliding-window-type: count_based
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state:
          seconds: 20
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  bulkhead:
    instances:
      kafkaProducer:
        max-concurrent-calls: 20
        max-wait-duration:
          nanos: 200